version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: quant_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/quant_platform
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  pgdata:
